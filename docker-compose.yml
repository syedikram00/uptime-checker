
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uptime
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  checker:
    build:
      context: .
      dockerfile: Dockerfile.checker
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/uptime
    depends_on:
      - postgres    

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/uptime
    depends_on:
      - postgres 
volumes:
  postgres_data:



